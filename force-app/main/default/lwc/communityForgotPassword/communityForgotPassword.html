<template>
    <!-- Top Header with Logo (matching login page) -->
    <header class="top-header">
        <div class="top-header__content content-wrap">
            <div class="top-header__logo-container">
                <img src={fsmtbLogoUrl} alt="FSMTB Logo" class="top-header__logo" onerror={handleLogoError}/>
            </div>
            <div class="top-header__text">
                <div class="top-header__title">FSMTB</div>
                <div class="top-header__subtitle">FEDERATION OF STATE</div>
                <div class="top-header__subtitle">MASSAGE THERAPY BOARDS</div>
            </div>
        </div>
    </header>

    <!-- Header Section -->
    <header class="page-header">
        <div class="page-header__content-wrap content-wrap">
            <img src={headerImageUrl} alt="Header Image" class="page-header__image" 
                 onerror={handleImageError} />
            <h1 class="page-header__heading">{siteLabels.forgotPassword}</h1>
        </div>
    </header>

    <!-- Main Content -->
    <div class="content-wrap align-center forgot-password-container">
        <p class="title-text">{siteLabels.enterPassword}</p>
        
        <div class="spacing"></div>
        
        <p class="info-text">
            If you have reached this page by clicking a reset link from your email, either your reset link expired or the reset link has already been used.
        </p>

        <!-- Forgot Password Form -->
        <form onsubmit={handleSubmit} class="login-form">
            <!-- Error Message Display -->
            <template if:true={errorMessage}>
                <div class="error-message">
                    <lightning-icon icon-name="utility:error" size="small" class="error-icon"></lightning-icon>
                    <span>{errorMessage}</span>
                </div>
            </template>

            <div class="form-grid">
                <label for="username" class="form-label">
                    {siteLabels.username}
                </label>
                <div class="form-input-wrapper">
                    <span class="required-indicator">*</span>
                    <lightning-input
                        type="text"
                        id="username"
                        name="username"
                        value={username}
                        onchange={handleUsernameChange}
                        placeholder={siteLabels.username}
                        variant="label-hidden"
                        required
                        class="form-input">
                    </lightning-input>
                </div>

                <div class="form-label"></div>
                <lightning-button
                    type="submit"
                    label={siteLabels.submit}
                    variant="brand"
                    disabled={isLoading}
                    class="submit-button">
                </lightning-button>
            </div>
        </form>
    </div>
</template>
