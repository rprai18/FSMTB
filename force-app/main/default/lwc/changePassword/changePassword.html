<template>
    <!-- Header Section -->
    <header class="page-header">
        <div class="page-header__content-wrap content-wrap">
            <!-- <img src={headerImageUrl} alt="Leg Massage Image" class="page-header__image" 
                 onerror={handleImageError} /> -->
            <h1 class="page-header__heading">{pageTitle}</h1>
        </div>
    </header>

    <!-- Main Content -->
    <div class="content-wrap change-password-container">
            <p class="password-requirements">
                Passwords must be at least 10 characters long and include a mix of alpha, numeric and special characters.
            </p>

            <!-- Error Message Display -->
            <template if:true={errorMessage}>
                <div class="error-message">
                    <lightning-icon icon-name="utility:error" size="small" class="error-icon"></lightning-icon>
                    <span>{errorMessage}</span>
                </div>
            </template>

            <!-- Password Form -->
            <form onsubmit={handleSubmit} class="password-form">
                <div class="form-grid">
                    <!-- Old Password Field (only shown if password is not expired) -->
                    <template if:true={showOldPasswordField}>
                        <div class="form-row">
                            <label for="oldPassword" class="form-label">
                                Old Password
                            </label>
                            <lightning-input
                                type="password"
                                id="oldPassword"
                                name="oldPassword"
                                value={oldPassword}
                                onchange={handleOldPasswordChange}
                                class="form-input">
                            </lightning-input>
                        </div>
                    </template>

                    <!-- New Password Field -->
                    <div class="form-row">
                        <label for="newPassword" class="form-label">
                            New Password
                        </label>
                        <lightning-input
                            type="password"
                            id="newPassword"
                            name="newPassword"
                            value={newPassword}
                            onchange={handleNewPasswordChange}
                            class="form-input">
                        </lightning-input>
                    </div>

                    <!-- Verify New Password Field -->
                    <div class="form-row">
                        <label for="verifyNewPassword" class="form-label">
                            Verify New Password
                        </label>
                        <lightning-input
                            type="password"
                            id="verifyNewPassword"
                            name="verifyNewPassword"
                            value={verifyNewPassword}
                            onchange={handleVerifyPasswordChange}
                            class="form-input">
                        </lightning-input>
                    </div>

                    <!-- Submit Button -->
                    <div class="form-row form-row--button">
                        <div class="form-label"></div>
                        <lightning-button
                            type="submit"
                            label="Submit"
                            variant="brand"
                            disabled={isLoading}
                            class="submit-button">
                        </lightning-button>
                    </div>
                </div>
            </form>
        </div>
</template>
