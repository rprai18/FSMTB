<template>
    <div class="forgot-password-confirm-container">
        <center>
            <div class="confirm-panel-grid">
                <div class="confirm-panel">
                    <div class="confirm-content">
                        <div class="confirm-image-container">
                            <img src={clockImageUrl} alt="Clock" class="confirm-image" onerror={handleImageError}/>
                        </div>
                        <div class="confirm-text-container">
                            <h2 class="confirm-title">{siteLabels.tempPasswordSent}</h2>
                            <div class="confirm-message">
                                <lightning-button
                                    label={siteLabels.goToLoginPage}
                                    variant="brand"
                                    onclick={navigateToLogin}
                                    class="login-button">
                                </lightning-button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </center>
    </div>
</template>
