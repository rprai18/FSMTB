<template>
    <div class="new-course-container">
        <!-- Loading State -->
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </template>

        <!-- Error State -->
        <template if:true={error}>
            <div class="slds-m-around_medium">
                <lightning-icon icon-name="utility:error" size="small" class="slds-m-right_x-small"></lightning-icon>
                <span>{error}</span>
            </div>
        </template>

        <!-- Main Content -->
        <template if:false={isLoading}>
            <!-- Header Section -->
            <div class="header-section">
                <!-- <img src={headerImage0} alt="Header" class="header-section__image"/> -->
                <h1 class="page-title">New Course</h1>
            </div>

            <!-- Instructional Content -->
            <template if:true={content}>
                <div class="content-section">
                    <div class="instruction-content" lwc:dom="manual"></div>
                </div>
            </template>

            <!-- Course Information Form -->
            <div class="form-section">
                <div class="slds-box slds-theme_default">
                    <h2 class="slds-text-heading_medium slds-m-bottom_medium">Course Information</h2>
                    
                    <!-- Course Name -->
                    <lightning-input
                        label="Course Name"
                        value={courseName}
                        onchange={handleCourseNameChange}
                        required="true"
                        class={courseNameErrorClass}>
                    </lightning-input>
                    <template if:true={displayCourseNameError}>
                        <div class="slds-form-element__help slds-text-color_error slds-m-top_x-small">
                            Course name is required.
                        </div>
                    </template>

                    <!-- Category -->
                    <lightning-combobox
                        label="Category"
                        value={category}
                        options={categoryOptions}
                        onchange={handleCategoryChange}
                        required="true"
                        disabled={isCategoryDisabled}
                        class="slds-m-top_small">
                    </lightning-combobox>
                    <template if:true={displayCategoryError}>
                        <div class="slds-form-element__help slds-text-color_error slds-m-top_x-small">
                            You must select a course category from the dropdown list.
                        </div>
                    </template>

                    <!-- Sub Category -->
                    <template if:true={renderDependentPicklist}>
                        <lightning-combobox
                            label="Sub Category"
                            value={subCategory}
                            options={subCategoryOptions}
                            onchange={handleSubCategoryChange}
                            required="true"
                            class="slds-m-top_small">
                        </lightning-combobox>
                        <template if:true={displaySubCategoryError}>
                            <div class="slds-form-element__help slds-text-color_error slds-m-top_x-small">
                                You must select a course sub category from the dropdown list.
                            </div>
                        </template>
                    </template>

                    <!-- Course Objectives -->
                    <lightning-input
                        label="Course Objectives"
                        value={courseSummary}
                        onchange={handleCourseSummaryChange}
                        max-length="500"
                        required="true"
                        class="slds-m-top_small {courseSummaryErrorClass}">
                    </lightning-input>
                    <template if:true={displayCourseSummaryError}>
                        <div class="slds-form-element__help slds-text-color_error slds-m-top_x-small">
                            Course Objectives cannot exceed 500 characters.
                        </div>
                    </template>
                    <div class="slds-form-element__help slds-m-top_x-small">
                        {courseSummaryLength}/500 characters
                    </div>

                    <!-- Course Summary -->
                    <lightning-textarea
                        label="Course Summary"
                        value={description}
                        onchange={handleDescriptionChange}
                        max-length="500"
                        required="true"
                        class="slds-m-top_small">
                    </lightning-textarea>
                    <template if:true={displayDescriptionError}>
                        <div class="slds-form-element__help slds-text-color_error slds-m-top_x-small">
                            Course Summary is required.
                        </div>
                    </template>
                    <template if:true={displayDescriptionCountError}>
                        <div class="slds-form-element__help slds-text-color_error slds-m-top_x-small">
                            Course Summary cannot exceed 500 characters.
                        </div>
                    </template>
                    <div class="slds-form-element__help slds-m-top_x-small">
                        {descriptionLength}/500 characters
                    </div>

                    <!-- Registration Phone -->
                    <lightning-input
                        label="Registration Phone"
                        value={registrationPhone}
                        onchange={handleRegistrationPhoneChange}
                        type="tel"
                        placeholder="###-###-####"
                        required="true"
                        class="slds-m-top_small">
                    </lightning-input>
                    <template if:true={displayRegistrationPhoneError}>
                        <div class="slds-form-element__help slds-text-color_error slds-m-top_x-small">
                            A course registration contact telephone number is required.
                        </div>
                    </template>

                    <!-- Registration Website -->
                    <lightning-input
                        label="Course Registration URL"
                        value={registrationWebsite}
                        onchange={handleRegistrationWebsiteChange}
                        type="url"
                        class="slds-m-top_small">
                    </lightning-input>

                    <!-- Special Circumstances -->
                    <lightning-textarea
                        label="Special Circumstances"
                        value={specialCircumstances}
                        onchange={handleSpecialCircumstancesChange}
                        placeholder="An exception to the General Provider Policies that applies to this course and all of its sessions."
                        class="slds-m-top_small">
                    </lightning-textarea>

                    <!-- Fee Notice -->
                    <div class="slds-m-top_medium fee-notice">
                        A fee of {courseFeeFormatted} will apply to each course submitted.
                    </div>

                    <!-- Action Buttons -->
                    <div class="slds-m-top_medium button-group">
                        <lightning-button
                            label="Cancel"
                            onclick={handleCancel}
                            variant="neutral">
                        </lightning-button>
                        <lightning-button
                            label="Save as Draft"
                            onclick={handleSaveDraft}
                            variant="brand"
                            class="slds-m-left_small">
                        </lightning-button>
                        <lightning-button
                            label="Submit"
                            onclick={handleSubmit}
                            variant="brand"
                            class="slds-m-left_small">
                        </lightning-button>
                    </div>
                </div>
            </div>
        </template>
    </div>
</template>
